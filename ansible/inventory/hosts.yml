all:
  children:
    nginx:
      hosts:
        nginx-dev:
          ansible_host: "{{ nginx_hosts.dev.ip }}"
          cert_name: hdc-dev
          nginx_env: dev
          freeipa_hostname: ldap.dev.hdc.ebrains.eu
          freeipa_cert_name: ldap-dev
          domains:
            - dev.hdc.ebrains.eu
            - argocd.dev.hdc.ebrains.eu
        nginx-prod:
          ansible_host: "{{ nginx_hosts.prod.ip }}"
          cert_name: hdc-prod
          nginx_env: prod
          freeipa_hostname: ldap.hdc.ebrains.eu
          freeipa_cert_name: ldap-prod
          domains:
            - hdc.ebrains.eu
    nfs:
      hosts:
        nfs-dev:
          ansible_host: "{{ nfs_hosts.dev.ip }}"
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -p {{ target_ssh_port }} -i {{ ssh_key_path }} ubuntu@{{ nginx_hosts.dev.ip }}"'
    freeipa:
      hosts:
        freeipa-dev:
          ansible_host: "{{ freeipa_hosts.dev.ip }}"
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -p {{ target_ssh_port }} -i {{ ssh_key_path }} ubuntu@{{ nginx_hosts.dev.ip }}"'
          freeipa_domain: dev.hdc.ebrains.eu
          freeipa_project_hosts:
            - ldap-workspacetest.dev.hdc.ebrains.eu
          freeipa_sudo_users:
            - user: acascais
              hosts:
                - ldap-workspacetest.dev.hdc.ebrains.eu
    guacamole:
      hosts:
        guacamole-workspacetest-dev:
          ansible_host: "{{ guacamole_hosts.dev.workspacetest.ip }}"
          ansible_port: "{{ ssh_port | default(guacamole_target_ssh_port) }}"
          ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -p {{ target_ssh_port }} -i {{ ssh_key_path }} ubuntu@{{ nginx_hosts.dev.ip }}"'
          guacamole_project: workspacetest
          freeipa_domain: dev.hdc.ebrains.eu
          freeipa_server_ip: "{{ freeipa_hosts.dev.ip }}"
  vars:
    ansible_port: "{{ ssh_port | default(target_ssh_port) }}"
    ansible_ssh_private_key_file: "{{ ssh_key_path }}"
    ci_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINsTpMKMYRhebeeQNgYSEJNMJ7km/dMkEph+Pq5GIjL2 robot-cicd@indocresearch.org"
