---
- name: Configure nginx TLS passthrough to ingress-nginx
  hosts: nginx
  become: true
  vars:
    # FreeIPA SNI routing + L7 proxy only when server IP is configured
    has_freeipa: "{{ freeipa_hostname is defined and nginx_env in (freeipa_hosts | default({})) }}"
  tasks:
    - name: Skip host if K8s nodes not configured
      meta: end_host
      when: nginx_hosts[nginx_env].k8s_nodes is not defined

    - name: Install nginx stream module
      apt:
        name: libnginx-mod-stream
        state: present
        update_cache: yes
        cache_valid_time: 3600

    - name: Ensure stream.d directory exists
      file:
        path: /etc/nginx/stream.d
        state: directory
        mode: '0755'

    - name: Add stream block to nginx.conf
      blockinfile:
        path: /etc/nginx/nginx.conf
        marker: "# {mark} ANSIBLE MANAGED - stream block"
        insertbefore: "^http {"
        block: |
          stream {
              include /etc/nginx/stream.d/*.conf;
          }
      notify: Reload nginx

    - name: Configure TLS passthrough (port 443)
      template:
        src: ../templates/nginx/https-passthrough.conf.j2
        dest: /etc/nginx/stream.d/https-passthrough.conf
      notify: Reload nginx

    - name: Remove old k8s-only stream config
      file:
        path: /etc/nginx/stream.d/k8s-https.conf
        state: absent
      notify: Reload nginx

    - name: Update HTTP config for passthrough (port 80)
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          upstream k8s_http {
          {% for node in nginx_hosts[nginx_env].k8s_nodes %}
              server {{ node }}:30080 max_fails=3 fail_timeout=30s;
          {% endfor %}
          }
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;
              location / {
                  proxy_pass http://k8s_http;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      notify: Reload nginx

    - name: Ensure default site is enabled
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
      notify: Reload nginx

    - name: Disable old ArgoCD site config
      file:
        path: /etc/nginx/sites-enabled/argocd.conf
        state: absent
      notify: Reload nginx

    # --- FreeIPA L7 reverse proxy (LE cert for HSTS compatibility) ---
    # Only deployed when freeipa_hosts[nginx_env] is configured in sensitive.yml

    - name: Create certbot webroot directory
      file:
        path: /var/www/certbot
        state: directory
        mode: "0755"
      when: has_freeipa | bool

    - name: Check if LE cert exists
      stat:
        path: /etc/letsencrypt/live/{{ freeipa_cert_name }}/fullchain.pem
      register: le_cert
      when: has_freeipa | bool

    - name: Deploy HTTP-only config for initial certbot
      copy:
        dest: /etc/nginx/sites-available/freeipa-ldap.conf
        content: |
          server {
              listen 80;
              listen [::]:80;
              server_name {{ freeipa_hostname }};

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }
      when: (has_freeipa | bool) and not (le_cert.stat.exists | default(false))
      notify: Reload nginx

    - name: Enable FreeIPA site
      file:
        src: /etc/nginx/sites-available/freeipa-ldap.conf
        dest: /etc/nginx/sites-enabled/freeipa-ldap.conf
        state: link
      when: has_freeipa | bool
      notify: Reload nginx

    - name: Flush handlers before certbot
      meta: flush_handlers

    - name: Install certbot
      apt:
        name: certbot
        state: present
      when: has_freeipa | bool

    - name: Obtain LE certificate for FreeIPA
      command: >
        certbot certonly --webroot
        --webroot-path /var/www/certbot
        --non-interactive
        --agree-tos
        --keep-until-expiring
        --cert-name {{ freeipa_cert_name }}
        --email {{ admin_email }}
        -d {{ freeipa_hostname }}
      register: certbot_result
      changed_when: "'Certificate not yet due for renewal' not in certbot_result.stdout"
      when: has_freeipa | bool

    - name: Enable certbot auto-renewal timer
      systemd:
        name: certbot.timer
        state: started
        enabled: true
      when: has_freeipa | bool

    - name: Deploy FreeIPA HTTPS reverse proxy config
      copy:
        dest: /etc/nginx/sites-available/freeipa-ldap.conf
        content: |
          server {
              listen 80;
              listen [::]:80;
              server_name {{ freeipa_hostname }};

              location /.well-known/acme-challenge/ {
                  root /var/www/certbot;
              }

              location / {
                  return 301 https://$host$request_uri;
              }
          }

          server {
              listen 127.0.0.1:8443 ssl;
              server_name {{ freeipa_hostname }};

              ssl_certificate /etc/letsencrypt/live/{{ freeipa_cert_name }}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/{{ freeipa_cert_name }}/privkey.pem;

              location / {
                  proxy_pass https://{{ freeipa_hosts[nginx_env].ip }};
                  proxy_ssl_verify off;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
              }
          }
      when: has_freeipa | bool
      notify: Reload nginx

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
