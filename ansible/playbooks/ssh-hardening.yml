- name: SSH hardening
  hosts: nginx:nfs:freeipa:guacamole
  become: yes
  tasks:
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Change SSH port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port'
        line: 'Port {{ target_ssh_port }}'
      register: port_changed

    # Detect SSH mode: Ubuntu 24.04 uses ssh.socket (systemd socket activation),
    # Ubuntu 22.04 uses ssh.service (standalone sshd)
    - name: Check if ssh.socket exists
      command: systemctl list-unit-files ssh.socket
      register: ssh_socket_check
      changed_when: false
      failed_when: false

    - name: Set SSH service type
      set_fact:
        ssh_uses_socket: "{{ 'ssh.socket' in ssh_socket_check.stdout }}"

    # --- Ubuntu 24.04+ (ssh.socket) ---

    - name: Remove stale socket override if present
      file:
        path: /etc/systemd/system/ssh.socket.d
        state: absent
      register: override_removed
      when: ssh_uses_socket

    - name: Reload systemd (triggers sshd-socket-generator)
      systemd:
        daemon_reload: yes
      when: ssh_uses_socket and (port_changed.changed or override_removed.changed)

    - name: Ensure ssh.socket is enabled
      systemd:
        name: ssh.socket
        enabled: yes
      when: ssh_uses_socket

    - name: Restart ssh.socket
      systemd:
        name: ssh.socket
        state: restarted
      when: ssh_uses_socket and (port_changed.changed or override_removed.changed)

    # --- Ubuntu 22.04 (ssh.service) ---

    - name: Restart ssh.service
      systemd:
        name: ssh
        state: restarted
      when: not ssh_uses_socket and port_changed.changed

