name: Ansible Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'ansible/**'
      - '.ansible-lint'
      - '.yamllint'
      - '.github/workflows/ansible-lint.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ansible-core ansible-lint yamllint

      - name: yamllint
        run: yamllint ansible/

      - name: Install collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: ansible-lint
        run: ansible-lint ansible/

      - name: Syntax check
        run: |
          cd ansible
          # Dummy vars satisfy inventory templates without SOPS decryption
          dummy_vars=(
            -e ssh_key_path=/dev/null
            -e target_ssh_port=22
            -e guacamole_target_ssh_port=22
            -e admin_email=ci@example.com
            -e freeipa_admin_password=x
            -e freeipa_ds_password=x
            -e argocd_kubeconfig=/dev/null
            -e gitops_repo_path=/tmp
            -e '{"nginx_hosts":{"dev":{"ip":"1.2.3.4","k8s_nodes":["1.2.3.5","1.2.3.6"]},"prod":{"ip":"1.2.3.7"}}}'
            -e '{"nfs_hosts":{"dev":{"ip":"1.2.3.8"}}}'
            -e '{"freeipa_hosts":{"dev":{"ip":"1.2.3.9"}}}'
            -e '{"guacamole_hosts":{"dev":{"workspacetest":{"ip":"1.2.3.10"}}}}'
          )
          for pb in playbooks/site.yml playbooks/nfs-server.yml playbooks/freeipa-server.yml playbooks/guacamole-vm.yml; do
            echo "--- Checking $pb ---"
            ansible-playbook "$pb" --syntax-check "${dummy_vars[@]}"
          done
