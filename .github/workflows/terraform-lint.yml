name: Terraform Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      TF_INPUT: 0
      TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2

      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1

      - run: mkdir -p $TF_PLUGIN_CACHE_DIR

      # Server-side secret scanning (free CLI, no license needed for orgs)
      - name: gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz
          ./gitleaks detect --source . --verbose

      - name: fmt check
        run: |
          terraform fmt -check terraform/
          terraform fmt -check terraform/keycloak/
          terraform fmt -check terraform/kong/

      # Validate (needs init -backend=false + dummy vars for required inputs)
      - name: Validate infra
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate
        env:
          TF_VAR_ovh_application_key: "x"
          TF_VAR_ovh_application_secret: "x"
          TF_VAR_ovh_consumer_key: "x"
          TF_VAR_ovh_project_id: "x"
          TF_VAR_ssh_key_name: "x"
          TF_VAR_instance_flavor_id: "x"
          TF_VAR_instance_image_id: "x"
          TF_VAR_env: "dev"
          TF_VAR_vlan_id: "1"
          TF_VAR_subnet: "10.0.0.0/24"
          TF_VAR_subnet_start: "10.0.0.2"
          TF_VAR_subnet_end: "10.0.0.254"

      - name: Validate keycloak
        working-directory: terraform/keycloak
        run: |
          terraform init -backend=false
          terraform validate
        env:
          TF_VAR_domain: "example.com"
          TF_VAR_env: "dev"
          TF_VAR_keycloak_admin_user: "x"
          TF_VAR_keycloak_admin_password: "x"
          TF_VAR_keycloak_url: "https://example.com"
          TF_VAR_test_admin_password: "x"
          TF_VAR_ebrains_oidc_client_id: "x"
          TF_VAR_ebrains_oidc_client_secret: "x"

      - name: Validate kong
        working-directory: terraform/kong
        run: |
          terraform init -backend=false
          terraform validate
        env:
          TF_VAR_env: "dev"
          TF_VAR_oidc_discovery: "https://example.com/.well-known/openid-configuration"
          TF_VAR_oidc_introspection_endpoint: "https://example.com/introspect"
          TF_VAR_oidc_client_secret: "x"
          TF_VAR_cors_origins: "https://example.com"

      # tflint
      - name: tflint
        run: tflint --recursive
        working-directory: terraform

      # checkov
      - uses: bridgecrewio/checkov-action@87cb061d2ad2522f7714e5e34e3a5b9957314198 # v12.2964.0
        with:
          directory: terraform/
          quiet: true
